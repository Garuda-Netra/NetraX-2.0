<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Instagram">
  <defs>
    <radialGradient id="ig-bg" cx="30%" cy="107%" r="130%">
      <stop offset="0%"  stop-color="#fdf497"/>
      <stop offset="10%" stop-color="#fdf497"/>
      <stop offset="22%" stop-color="#fd5949"/>
      <stop offset="44%" stop-color="#d6249f"/>
      <stop offset="70%" stop-color="#285aeb"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7.5" fill="url(#ig-bg)"/>
  <!-- Outer rounded-square ring (camera body) -->
  <rect x="7" y="7" width="18" height="18" rx="5"
        fill="none" stroke="#fff" stroke-width="1.9"/>
  <!-- Lens circle -->
  <circle cx="16" cy="16" r="4.6"
          fill="none" stroke="#fff" stroke-width="1.9"/>
  <!-- Viewfinder dot -->
  <circle cx="22.2" cy="9.8" r="1.15" fill="#fff"/>
</svg>
